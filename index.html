<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Masuk ke Apple ID</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    :root {
      --apple-blue: #007AFF;
      --apple-purple: #5856D6;
      --apple-pink: #FF2D55;
      --apple-orange: #FF9500;
      --apple-green: #34C759;
      --apple-black: #1D1D1F;
      --apple-dark-gray: #424245;
      --apple-gray: #86868B;
      --apple-light-gray: #D2D2D7;
      --apple-bg: #F5F5F7;
      --apple-white: #FFFFFF;
    }

    body {
      background: linear-gradient(135deg, #f2f2f7 0%, #e5e5ea 50%, #f2f2f7 100%);
      color: var(--apple-black);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 440px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background-color: var(--apple-white);
      color: var(--apple-black);
      padding: 40px 35px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .header {
      text-align: center;
      margin-bottom: 35px;
    }

    .apple-logo {
      width: 70px;
      height: 70px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, var(--apple-blue) 0%, var(--apple-purple) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
      font-weight: 300;
      box-shadow: 0 4px 12px rgba(88, 86, 214, 0.3);
      transition: transform 0.3s;
    }

    .apple-logo:hover {
      transform: scale(1.05);
    }

    .card h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--apple-blue) 0%, var(--apple-purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--apple-gray);
      font-size: 16px;
    }

    .form-container {
      margin-top: 25px;
    }

    .input-group {
      margin-bottom: 22px;
      position: relative;
    }

    .input-label {
      display: flex;
      align-items: center;
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--apple-dark-gray);
    }

    .input-label i {
      margin-right: 8px;
      font-size: 14px;
    }

    .input-wrapper {
      position: relative;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      border: 1.5px solid var(--apple-light-gray);
      border-radius: 12px;
      font-size: 16px;
      background-color: var(--apple-white);
      color: var(--apple-black);
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: var(--apple-blue);
      box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
    }

    input.error {
      border-color: var(--apple-pink);
      box-shadow: 0 0 0 4px rgba(255, 45, 85, 0.1);
    }

    input.success {
      border-color: var(--apple-green);
    }

    .input-icon {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--apple-gray);
      font-size: 18px;
    }

    .toggle-password {
      background: none;
      border: none;
      color: var(--apple-gray);
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: var(--apple-blue);
    }

    .input-hint {
      font-size: 13px;
      color: var(--apple-gray);
      margin-top: 6px;
      display: block;
      padding-left: 22px;
    }

    .input-hint.error {
      color: var(--apple-pink);
    }

    .input-hint.success {
      color: var(--apple-green);
    }

    button.submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--apple-blue) 0%, var(--apple-purple) 100%);
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 17px;
      color: var(--apple-white);
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
      box-shadow: 0 4px 12px rgba(88, 86, 214, 0.3);
      position: relative;
      overflow: hidden;
    }

    button.submit-btn:hover:enabled {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(88, 86, 214, 0.4);
    }

    button.submit-btn:active:enabled {
      transform: translateY(0);
    }

    button.submit-btn:disabled {
      background: var(--apple-light-gray);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--apple-light-gray), transparent);
      margin: 25px 0;
    }

    .terms {
      font-size: 14px;
      color: var(--apple-gray);
      text-align: center;
      line-height: 1.6;
    }

    .terms a {
      color: var(--apple-blue);
      text-decoration: none;
      transition: color 0.2s;
    }

    .terms a:hover {
      color: var(--apple-purple);
      text-decoration: underline;
    }

    .register-link {
      text-align: center;
      margin-top: 25px;
      font-size: 16px;
      color: var(--apple-gray);
    }

    .register-link a {
      color: var(--apple-blue);
      text-decoration: none;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: color 0.2s;
    }

    .register-link a:hover {
      color: var(--apple-purple);
      text-decoration: underline;
    }

    .notification {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: var(--apple-white);
      color: var(--apple-black);
      padding: 30px;
      border-radius: 20px;
      z-index: 1000;
      display: none;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
      border-top: 5px solid var(--apple-blue);
      max-width: 85%;
      width: 380px;
      animation: notificationSlide 0.3s ease-out;
    }

    @keyframes notificationSlide {
      from { opacity: 0; transform: translate(-50%, -40%); }
      to { opacity: 1; transform: translate(-50%, -50%); }
    }

    .notification.error {
      border-top-color: var(--apple-pink);
    }

    .notification.success {
      border-top-color: var(--apple-green);
    }

    .notification-icon {
      font-size: 48px;
      margin-bottom: 20px;
      color: var(--apple-blue);
    }

    .notification.error .notification-icon {
      color: var(--apple-pink);
    }

    .notification.success .notification-icon {
      color: var(--apple-green);
    }

    .notification-message {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 25px;
    }

    .notification button {
      background: linear-gradient(135deg, var(--apple-blue) 0%, var(--apple-purple) 100%);
      margin-top: 10px;
      width: auto;
      padding: 12px 30px;
      border-radius: 10px;
      border: none;
      color: white;
      font-weight: 500;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.2s;
    }

    .notification button:hover {
      transform: scale(1.05);
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 999;
      display: none;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 480px) {
      .card {
        padding: 30px 25px;
        border-radius: 16px;
      }
      
      .card h1 {
        font-size: 24px;
      }
      
      input {
        padding: 14px 16px;
      }
      
      .notification {
        width: 90%;
        padding: 25px;
      }
    }

    .language-selector {
      position: absolute;
      top: 20px;
      right: 20px;
    }

    .language-selector select {
      background: transparent;
      border: 1px solid var(--apple-light-gray);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 14px;
      color: var(--apple-dark-gray);
      cursor: pointer;
    }

    .privacy-note {
      background: rgba(0, 122, 255, 0.05);
      border-radius: 10px;
      padding: 15px;
      margin: 20px 0;
      font-size: 13px;
      color: var(--apple-dark-gray);
      border-left: 3px solid var(--apple-blue);
    }

    .privacy-note i {
      color: var(--apple-blue);
      margin-right: 8px;
    }

    .forgot-password {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 20px;
    }

    .forgot-password a {
      color: var(--apple-blue);
      text-decoration: none;
      font-size: 14px;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="language-selector">
      <select id="language">
        <option value="id">Bahasa Indonesia</option>
        <option value="en">English</option>
      </select>
    </div>
    
    <div class="card">
      <div class="header">
        <div class="apple-logo">
          <i class="fa-brands fa-apple"></i>
        </div>
        <h1>Masuk ke Apple ID</h1>
        <p class="subtitle">Gunakan Apple ID Anda untuk mengakses semua layanan Apple.</p>
      </div>
      
      <div class="privacy-note">
        <i class="fas fa-shield-alt"></i>
        <span>Informasi Anda aman dan terenkripsi.</span>
      </div>
      
      <div class="form-container">
        <form onsubmit="login(event)">
          <div class="input-group">
            <label class="input-label">
              <i class="fas fa-mobile-alt"></i>Nomor Telepon
            </label>
            <div class="input-wrapper">
              <input type="tel" id="nohp" placeholder="8xxxxxxxxxx" required autofocus />
              <span class="input-icon"><i class="fas fa-mobile-alt"></i></span>
            </div>
            <span class="input-hint" id="phoneHint">Masukkan nomor telepon yang terdaftar</span>
          </div>
          
          <div class="input-group">
            <label class="input-label">
              <i class="fas fa-lock"></i>Kata Sandi
            </label>
            <div class="input-wrapper">
              <input type="password" id="password" placeholder="Masukkan kata sandi" required />
              <button type="button" class="toggle-password input-icon" onclick="togglePassword('password')">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <div class="forgot-password">
              <a href="forgot-password.html">Lupa kata sandi?</a>
            </div>
          </div>
          
          <button type="submit" class="submit-btn" id="loginBtn">
            <span id="btnText">Masuk</span>
            <div id="btnSpinner" style="display: none;">
              <i class="fas fa-spinner fa-spin"></i> Memproses...
            </div>
          </button>
        </form>
        
        <div class="divider"></div>
        
        <div class="terms">
          Dengan masuk, Anda menyetujui 
          <a href="#">Ketentuan Layanan</a> dan 
          <a href="#">Kebijakan Privasi</a> Apple.
        </div>
        
        <div class="register-link">
          <a href="register.html">
            <i class="fas fa-user-plus"></i> Belum punya Apple ID? Buat di sini
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>
  <div class="notification" id="notification">
    <div class="notification-icon">
      <i class="fas fa-check-circle" id="notificationIcon"></i>
    </div>
    <div class="notification-message" id="notificationMessage"></div>
    <button onclick="hideNotification()">Lanjutkan</button>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAuJSxpcFZ1QI-dEsEnx2qSqlb0wsvs6Mc",
  authDomain: "lginvest-776cf.firebaseapp.com",
  databaseURL: "https://lginvest-776cf-default-rtdb.firebaseio.com",
  projectId: "lginvest-776cf",
  storageBucket: "lginvest-776cf.firebasestorage.app",
  messagingSenderId: "831934282072",
  appId: "1:831934282072:web:6a8b7a5bcba5d4d1264d2d",
  measurementId: "G-265YF9DYCF"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Notification functions
function showNotification(msg, isError = false, isSuccess = false) {
  const notification = document.getElementById('notification');
  const overlay = document.getElementById('overlay');
  const message = document.getElementById('notificationMessage');
  const icon = document.getElementById('notificationIcon');
  
  message.textContent = msg;
  
  if (isError) {
    notification.className = 'notification error';
    icon.className = 'fas fa-exclamation-circle';
  } else if (isSuccess) {
    notification.className = 'notification success';
    icon.className = 'fas fa-check-circle';
  } else {
    notification.className = 'notification';
    icon.className = 'fas fa-info-circle';
  }
  
  notification.style.display = 'block';
  overlay.style.display = 'block';
}

function hideNotification() {
  document.getElementById('notification').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
}

// Toggle password visibility
function togglePassword(fieldId) {
  const field = document.getElementById(fieldId);
  const button = field.parentElement.querySelector('.toggle-password');
  const icon = button.querySelector('i');
  const type = field.getAttribute('type') === 'password' ? 'text' : 'password';
  
  field.setAttribute('type', type);
  
  if (type === 'password') {
    icon.className = 'fas fa-eye';
  } else {
    icon.className = 'fas fa-eye-slash';
  }
}

// Validate phone number
function validatePhoneNumber(phone) {
  return /^8\d{10,11}$/.test(phone);
}

// Real-time validation
document.addEventListener('DOMContentLoaded', function() {
  const nohpInput = document.getElementById('nohp');
  const phoneHint = document.getElementById('phoneHint');
  
  // Phone number validation - auto remove 0 at beginning
  nohpInput.addEventListener('input', function() {
    // Remove any non-digit characters
    this.value = this.value.replace(/\D/g, '');
    
    // If starts with 0, remove it
    if (this.value.startsWith('0')) {
      this.value = this.value.substring(1);
    }
    
    // If doesn't start with 8, set to empty
    if (this.value && !this.value.startsWith('8')) {
      this.value = '8' + this.value.substring(1);
    }
    
    const isValid = validatePhoneNumber(this.value);
    
    if (this.value && !isValid) {
      this.classList.add('error');
      this.classList.remove('success');
      phoneHint.classList.add('error');
      phoneHint.textContent = 'Nomor HP harus 11-12 digit dan diawali dengan 8';
    } else if (isValid) {
      this.classList.remove('error');
      this.classList.add('success');
      phoneHint.classList.remove('error');
      phoneHint.classList.add('success');
      phoneHint.textContent = 'Nomor HP valid';
    } else {
      this.classList.remove('error', 'success');
      phoneHint.classList.remove('error', 'success');
      phoneHint.textContent = 'Masukkan nomor telepon yang terdaftar';
    }
  });
});

// Function to reset form
function resetForm() {
  document.getElementById("password").value = "";
  document.getElementById("loginBtn").disabled = false;
  document.getElementById("btnText").style.display = 'block';
  document.getElementById("btnSpinner").style.display = 'none';
}

window.login = async function(e){
  e.preventDefault();
  
  const nohp = document.getElementById("nohp").value.trim();
  const password = document.getElementById("password").value;

  // Show loading state
  const btn = document.getElementById("loginBtn");
  const btnText = document.getElementById("btnText");
  const btnSpinner = document.getElementById("btnSpinner");
  
  btnText.style.display = 'none';
  btnSpinner.style.display = 'block';
  btn.disabled = true;

  try {
    const userRef = ref(db, "users/" + nohp);
    const snapshot = await get(userRef);

    if(snapshot.exists()){
      const data = snapshot.val();
      if(data.password === password){
        localStorage.setItem("nohp", nohp);
        showNotification("Login berhasil! Mengalihkan ke dashboard...", false, true);
        // Redirect otomatis tanpa perlu klik OK
        setTimeout(() => window.location.href = "dashboard.html", 2000);
      } else {
        showNotification("Kata sandi salah.", true);
        // Reset form jika ada kesalahan
        setTimeout(() => {
          resetForm();
        }, 1500);
      }
    } else {
      showNotification("Akun tidak ditemukan.", true);
      // Reset form jika ada kesalahan
      setTimeout(() => {
        resetForm();
      }, 1500);
    }
  } catch(err){
    showNotification("Gagal login: " + err.message, true);
    // Reset form jika ada kesalahan
    setTimeout(() => {
      resetForm();
    }, 1500);
  }
};

// Auto reset form when error notification is closed
document.getElementById('overlay').addEventListener('click', function() {
  const notification = document.getElementById('notification');
  if (notification.classList.contains('error')) {
    resetForm();
  }
  hideNotification();
});

// Auto referral from URL
document.addEventListener('DOMContentLoaded', function() {
  // Add language selector functionality
  document.getElementById('language').addEventListener('change', function() {
    if (this.value === 'en') {
      // In a real app, you would change the language here
      alert('Language changed to English');
    }
  });
});
</script>

</body>
</html>
